<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <!-- Character Encoding -->
  <meta charset="UTF-8" />

  <!-- Mobile Responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Browser Compatibility -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Primary Title -->
  <title>
    Dev Patel | Full Stack Developer | Data Analyst | AI & ML Enthusiast | Portfolio
  </title>

  <!-- Primary Meta Description -->
  <meta name="description"
    content="Dev Patel is a Full Stack Developer and Data Analyst specializing in AI & ML. Explore projects, hackathon wins, certifications, and technical achievements." />

  <!-- Keywords (Optional, for completeness) -->
  <meta name="keywords"
    content="Dev Patel, full stack developer, mern stack developer, data analyst, portfolio, hackathon, coding projects, certifications" />

  <!-- Author -->
  <meta name="author" content="Dev Patel" />

  <!-- Theme Color (Mobile Browsers) -->
  <meta name="theme-color" content="#0f172a" />

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="/logo.webp" />

  <!-- Open Graph (For WhatsApp, LinkedIn, Facebook sharing) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Dev Patel | Portfolio Website" />
  <meta property="og:description"
    content="Portfolio showcasing projects, hackathons, certifications, and achievements." />
  <meta property="og:url" content="https://dev-d-patel-portfolio.vercel.app/" />
  <meta property="og:image" content="https://dev-d-patel-portfolio.vercel.app/logo.webp" />

  <!-- Twitter Card (For Twitter/X sharing) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Dev Patel Portfolio" />
  <meta name="twitter:description" content="Explore my projects, achievements, and certifications." />
  <meta name="twitter:image" content="https://dev-d-patel-portfolio.vercel.app/logo.webp" />

  <!-- Robots Instruction -->
  <meta name="robots" content="index, follow" />

  <!-- Structured Data (Schema.org for better indexing) -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Dev Patel",
        "url": "https://dev-d-patel-portfolio.vercel.app",
        "image": "https://dev-d-patel-portfolio.vercel.app/logo.webp",
        "sameAs": [
          "https://github.com/Dev1822",
          "https://linkedin.com/in/dev-daxin-patel/"
        ],
        "jobTitle": "Full Stack Developer",
        "alumniOf": {
          "@type": "EducationalOrganization",
          "name": "Computer Engineering"
        },
        "knowsAbout": [
          "React",
          "JavaScript",
          "Node.js",
          "MongoDB",
          "Frontend Development",
          "AI/ML"
        ]
      }
    </script>

  <!-- Preconnect for Performance -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <!-- Font Preloads -->
  <link rel="preload" href="/fonts/inter-400.ttf" as="font" type="font/ttf" crossorigin="anonymous">

  <!-- Critical CSS -->
  <style id="critical-css">
    :root {
      --color-background: #0a0a0a;
      --color-surface: #121212;
      --color-surface-light: #1e1e1e;
      --color-primary: #ffffff;
      --color-secondary: #a1a1aa;
      --color-accent: #2563eb;
      --color-theme-border: rgba(255, 255, 255, 0.1);
      --color-theme-border-light: rgba(255, 255, 255, 0.05);
      --color-theme-hover-bg: rgba(255, 255, 255, 0.05);
      --color-theme-text-muted: rgba(255, 255, 255, 0.5);
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-syne: 'Syne', sans-serif;
      --font-spacemono: 'Space Mono', monospace;
    }

    html.light {
      --color-background: #f5f5f7;
      --color-surface: #e8e8ec;
      --color-surface-light: #dcdce0;
      --color-primary: #1a1a2e;
      --color-secondary: #52526a;
      --color-accent: #2563eb;
      --color-theme-border: rgba(0, 0, 0, 0.1);
      --color-theme-border-light: rgba(0, 0, 0, 0.05);
      --color-theme-hover-bg: rgba(0, 0, 0, 0.05);
      --color-theme-text-muted: rgba(0, 0, 0, 0.6);
    }

    html {
      background-color: var(--color-background);
      color: var(--color-primary);
      font-family: var(--font-sans);
      overflow-x: clip;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Navbar Basic Layout */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      transition: all 0.3s ease;
    }

    /* Hero Basic Layout */
    .hero-section {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 5rem;
      position: relative;
    }

    /* Prevent FOUC for hidden elements */
    [data-reveal] { opacity: 0; }
  </style>

  <!-- Deferred CSS Loading -->
  <link rel="preload" href="/src/index.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="/src/index.css">
  </noscript>

</head>

<body class="font-sans bg-background text-primary">
  <!-- Root Element for React -->
  <div id="root"></div>

  <!-- Vite/React Module Script -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- Fallback content for SEO (if JS fails) -->
  <noscript>
    <h1>Dev Patel - Full Stack Developer Portfolio</h1>
    <p>
      This portfolio includes projects, hackathons, certifications, and
      achievements of Dev Patel.
    </p>
  </noscript>
</body>

</html>
